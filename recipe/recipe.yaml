schema_version: 1

context:
  version: "2024.6"

package:
  name: allantools
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/allantools/allantools-${{ version }}.tar.gz
  sha256: c4380c74de834ac869aefc899038e784ef1dd396370be89d6836abffbe484289

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - numpy
    - scipy >=1.6.0
    - numpydoc
    - matplotlib-base
    - pytest

tests:
  - python:
      imports:
        - allantools
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: A python library for calculating Allan deviation and related time & frequency statistics
  license: LGPL-3.0-or-later
  license_file: LICENSE.txt
  homepage: https://github.com/aewallin/allantools
  documentation: https://allantools.readthedocs.io/en/latest/index.html

extra:
  recipe-maintainers:
    - aewallin
